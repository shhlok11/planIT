<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>planIT - Upload Syllabus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Syne:wght@500;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-container": "#03b5d3",
                        "on-tertiary-fixed-variant": "#003ea8",
                        "on-secondary-fixed": "#001f26",
                        "primary": "#d2bbff",
                        "surface-dim": "#11131d",
                        "surface-container": "#1e1f29",
                        "tertiary-fixed-dim": "#b4c5ff",
                        "surface-container-high": "#282934",
                        "outline-variant": "#4a4455",
                        "surface-container-highest": "#33343f",
                        "on-primary-fixed-variant": "#5a00c6",
                        "background": "#05060f", // Deep Void from prompt
                        "tertiary-fixed": "#dbe1ff",
                        "on-surface": "#e2e1f0",
                        "on-tertiary-fixed": "#00174b",
                        "tertiary-container": "#185ce4",
                        "on-secondary-fixed-variant": "#004e5c",
                        "tertiary": "#2563eb", // Cobalt from prompt
                        "surface-container-low": "#1a1b25",
                        "inverse-primary": "#732ee4",
                        "secondary-fixed": "#acedff",
                        "on-secondary-container": "#00424e",
                        "on-primary-fixed": "#25005a",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                        "on-error": "#690005",
                        "surface-tint": "#d2bbff",
                        "inverse-surface": "#e2e1f0",
                        "secondary": "#06b6d4", // Cyan from prompt
                        "primary-container": "#7c3aed", // Electric Violet
                        "primary-fixed": "#eaddff",
                        "on-tertiary-container": "#e0e5ff",
                        "primary-fixed-dim": "#d2bbff",
                        "on-tertiary": "#002a78",
                        "surface": "rgba(255, 255, 255, 0.03)", // Surface from prompt
                        "inverse-on-surface": "#2f303b",
                        "on-primary-container": "#ede0ff",
                        "on-primary": "#ffffff",
                        "surface-bright": "#373844",
                        "error-container": "#93000a",
                        "on-surface-variant": "#ccc3d8",
                        "surface-container-lowest": "#0c0e17",
                        "secondary-fixed-dim": "#4cd7f6",
                        "surface-variant": "#33343f",
                        "on-secondary": "#003640",
                        "on-background": "#e2e1f0",
                        "outline": "#958da1"
                    },
                    fontFamily: {
                        "headline": ["Syne", "sans-serif"],
                        "display": ["Syne", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Syne", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    backgroundImage: {
                        'aurora': 'radial-gradient(ellipse at top left, rgba(124, 58, 237, 0.15) 0%, transparent 40%), radial-gradient(ellipse at bottom right, rgba(6, 182, 212, 0.15) 0%, transparent 40%)',
                    }
                }
            }
        }
    </script>
<style>
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 11;
            opacity: 0.05;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                #ffffff 2px,
                #ffffff 4px
            );
        }
        .ghost-border {
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
        .ambient-glow {
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.08);
        }
        .text-gradient {
            background: linear-gradient(135deg, #7C3AED, #06B6D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .shimmer-hover:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center justify-center relative overflow-hidden bg-aurora">
<div class="noise-overlay"></div>
<div class="scan-line"></div>
<main class="w-full max-w-4xl px-6 relative z-20 flex flex-col items-center text-center">
<!-- Logo -->
<div class="mb-12 flex flex-col items-center">
<div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-container to-secondary flex items-center justify-center mb-4 ambient-glow">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">
                    data_exploration
                </span>
</div>
<h1 class="font-display font-[800] text-2xl tracking-tighter text-white">planIT</h1>
</div>
<!-- Typography -->
<div class="mb-12 space-y-4">
<h2 class="font-display font-[800] text-[52px] leading-tight tracking-[-0.03em]">
<span class="text-white block">Drop your syllabus.</span>
<span class="text-gradient block">Own your semester.</span>
</h2>
<p class="font-mono text-secondary text-sm tracking-widest uppercase opacity-80 max-w-xl mx-auto">
                AI extracts every deadline, builds your schedule, and syncs directly to your calendar.
            </p>
</div>
<!-- Upload Zone -->
<div class="w-full max-w-[480px] h-[200px] bg-surface backdrop-blur-[30px] rounded-2xl border-2 border-dashed border-primary-container/30 flex flex-col items-center justify-center mb-16 cursor-pointer hover:border-secondary/50 transition-colors duration-300 ambient-glow relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/5 to-secondary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<span class="material-symbols-outlined text-primary-container text-5xl mb-4 group-hover:-translate-y-2 transition-transform duration-300">
                cloud_upload
            </span>
<span class="font-mono text-white/80 text-sm tracking-wider uppercase z-10 group-hover:text-white transition-colors">
                Drag your PDF here
            </span>
<span class="font-body text-white/40 text-xs mt-2 z-10">
                or click to browse
            </span>
</div>
<!-- Feature Chips -->
<div class="flex flex-wrap justify-center gap-4">
<div class="bg-surface backdrop-blur-[20px] rounded-full px-6 py-2 flex items-center gap-2 ghost-border shimmer-hover cursor-default">
<span class="material-symbols-outlined text-secondary text-sm">bolt</span>
<span class="font-mono text-xs text-white/80 uppercase tracking-wider">AI Priority Scoring</span>
</div>
<div class="bg-surface backdrop-blur-[20px] rounded-full px-6 py-2 flex items-center gap-2 ghost-border shimmer-hover cursor-default">
<span class="material-symbols-outlined text-primary-container text-sm">calendar_month</span>
<span class="font-mono text-xs text-white/80 uppercase tracking-wider">Study Block Generator</span>
</div>
<div class="bg-surface backdrop-blur-[20px] rounded-full px-6 py-2 flex items-center gap-2 ghost-border shimmer-hover cursor-default">
<span class="material-symbols-outlined text-tertiary text-sm">download</span>
<span class="font-mono text-xs text-white/80 uppercase tracking-wider">Export to .ICS</span>
</div>
</div>
</main>
</body></html>
